<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ספירת הימים של אביטל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: #0d0d0f;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, #2a1a0a 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 110%, #1a0f00 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2.5vh 3vw 1.5vh;
    height: 100dvh;
    color: #f0e0c0;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    flex-shrink: 0;
  }

  .logo {
    font-size: clamp(1.1rem, 3vh, 1.9rem);
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #f5d98b 0%, #c8860a 50%, #f5d98b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4vh;
  }

  .logo::before, .logo::after {
    content: '✦';
    font-size: 0.6em;
    margin: 0 0.5em;
    opacity: 0.6;
  }

  .logo-footer {
    font-size: clamp(0.7rem, 1.8vh, 1.1rem);
    letter-spacing: 2px;
    margin-bottom: 0;
  }

  .eyebrow {
    font-size: clamp(0.6rem, 1.6vh, 0.8rem);
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8a6a3a;
    margin-bottom: 0.5vh;
  }

  header h1 {
    font-size: clamp(1.1rem, 3.8vh, 2.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #f5d98b 0%, #e8a830 50%, #f5d98b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  header p {
    font-size: clamp(0.65rem, 1.8vh, 0.95rem);
    font-weight: 300;
    color: #7a6040;
    margin-top: 0.4vh;
    letter-spacing: 1px;
  }

  /* thin gold divider */
  .divider {
    width: clamp(40px, 8vw, 80px);
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8a84b, transparent);
    margin: 1vh auto 0;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1vh 1.2vw;
    width: 100%;
    max-width: min(96vw, 155vh);
    flex: 1;
    align-content: center;
    justify-items: center;
  }

  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(5, 1fr); gap: 1.2vh 2vw; }
  }

  /* ── BULB CARD ── */
  .bulb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5vh;
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: clamp(6px, 1.2vh, 12px);
    padding: 0.8vh 0.4vw 0.6vh;
    transition: border-color 0.4s;
  }

  .bulb-wrap.lit {
    background: rgba(245, 180, 40, 0.05);
    border-color: rgba(245, 180, 40, 0.18);
  }

  .bulb-wrap span {
    font-size: clamp(0.5rem, 1.3vh, 0.78rem);
    font-weight: 400;
    color: #3a3020;
    letter-spacing: 1px;
  }

  .bulb-wrap.lit span { color: #c8a84b; }

  .bulb-wrap svg {
    width: 100%;
    height: auto;
    max-height: 9.5vh;
  }

  /* ── SVG COLORS ── */
  .bulb-glass     { fill: #1c1c1e; }
  .bulb-shine     { fill: rgba(255,255,255,0.04); }
  .bulb-filament  { stroke: #2e2e2e; }
  .bulb-base      { fill: #161616; }
  .bulb-base-line { stroke: #252525; }
  .bulb-cap       { fill: #111; }

  .lit .bulb-glass     { fill: url(#litGrad); }
  .lit .bulb-shine     { fill: rgba(255,255,255,0.22); }
  .lit .bulb-filament  { stroke: #fff8c0; }
  .lit .bulb-base      { fill: #7a6030; }
  .lit .bulb-base-line { stroke: #c8a84b; }
  .lit .bulb-cap       { fill: #5a4520; }

  .lit svg {
    filter:
      drop-shadow(0 0 5px #f5c84290)
      drop-shadow(0 0 14px #f5a50060)
      drop-shadow(0 0 28px #f5a50030);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeOn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lit svg {
    opacity: 0;
    animation: fadeOn 0.9s cubic-bezier(.4,0,.2,1) forwards;
    animation-delay: calc(var(--i) * 0.055s);
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 5px #f5c84290) drop-shadow(0 0 14px #f5a50060) drop-shadow(0 0 28px #f5a50030); }
    50%       { filter: drop-shadow(0 0 10px #f5c842cc) drop-shadow(0 0 26px #f5a500a0) drop-shadow(0 0 50px #f5a50050); }
  }

  .today svg {
    animation: fadeOn 0.9s cubic-bezier(.4,0,.2,1) forwards,
               pulse 2.2s ease-in-out calc(var(--i) * 0.055s + 1s) infinite;
  }

  .today .bulb-wrap-inner {
    position: relative;
  }

  @keyframes weddingGlow {
    0%, 100% { filter: drop-shadow(0 0 8px #fff8c0cc) drop-shadow(0 0 22px #f5c842aa) drop-shadow(0 0 45px #f5a50066); }
    50%       { filter: drop-shadow(0 0 16px #ffffffee) drop-shadow(0 0 38px #f5c842cc) drop-shadow(0 0 70px #f5a500aa); }
  }

  .wedding-day .lit svg {
    animation: fadeOn 0.9s cubic-bezier(.4,0,.2,1) forwards,
               weddingGlow 1.6s ease-in-out calc(var(--i) * 0.04s + 1s) infinite;
  }

  /* ── FOOTER ── */
  footer {
    flex-shrink: 0;
    width: 100%;
    max-width: min(96vw, 155vh);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-text {
    font-size: clamp(0.5rem, 1.3vh, 0.72rem);
    font-weight: 300;
    color: #2e2416;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── COUNTDOWN TIMER ── */
  .timer {
    display: flex;
    gap: clamp(6px, 1.2vw, 16px);
    align-items: flex-end;
  }

  .timer-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .timer-num {
    font-size: clamp(1rem, 2.8vh, 1.8rem);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(160deg, #f5d98b, #c8860a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 2ch;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .timer-label {
    font-size: clamp(0.45rem, 1.1vh, 0.62rem);
    font-weight: 300;
    color: #5a4a2a;
    letter-spacing: 1px;
  }

  .timer-sep {
    font-size: clamp(0.9rem, 2.4vh, 1.5rem);
    font-weight: 300;
    color: #3a2e18;
    padding-bottom: 0.3vh;
    line-height: 1;
  }
</style>
</head>
<body>

<header>
  <div class="logo">דוד &amp; אביטל</div>
  <div class="eyebrow">countdown</div>
  <h1 id="title">טוענת...</h1>
  <p id="subtitle"></p>
  <div class="divider"></div>
</header>

<div class="grid" id="grid"></div>

<footer>
  <div class="logo logo-footer">דוד &amp; אביטל</div>
  <span class="footer-text">כל נורה היא יום של ציפייה</span>
  <div class="timer" id="timer">
    <div class="timer-unit"><span class="timer-num" id="t-secs">--</span><span class="timer-label">שניות</span></div>
    <span class="timer-sep">:</span>
    <div class="timer-unit"><span class="timer-num" id="t-mins">--</span><span class="timer-label">דקות</span></div>
    <span class="timer-sep">:</span>
    <div class="timer-unit"><span class="timer-num" id="t-hours">--</span><span class="timer-label">שעות</span></div>
    <span class="timer-sep">:</span>
    <div class="timer-unit"><span class="timer-num" id="t-days">--</span><span class="timer-label">ימים</span></div>
  </div>
</footer>

<script>
  const WEDDING = new Date('2026-08-09T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  WEDDING.setHours(0, 0, 0, 0);

  const daysLeft = Math.round((WEDDING - today) / 86400000);
  const litCount = daysLeft <= 0 ? 30 : daysLeft >= 30 ? 0 : 30 - daysLeft;

  const titleEl = document.getElementById('title');
  const subEl   = document.getElementById('subtitle');

  if (daysLeft <= 0) {
    titleEl.textContent = '🎉 היום החתונה! 🎉';
    subEl.textContent   = 'כל האורות דולקים לכבודך';
    document.body.classList.add('wedding-day');
  } else if (daysLeft > 30) {
    titleEl.textContent = 'הספירה עוד לא התחילה';
    subEl.textContent   = `${daysLeft} ימים לחתונה`;
  } else {
    titleEl.textContent = `עוד ${daysLeft} ${daysLeft === 1 ? 'יום' : 'ימים'} – וכולנו באורות`;
    subEl.textContent   = litCount > 0 ? `${litCount} נורות דולקות כבר` : 'הספירה מתחילה היום';
  }

  const grid = document.getElementById('grid');

  // SVG defs (gradient) – מוסיפים פעם אחת
  const svgDefs = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgDefs.style.cssText = 'position:absolute;width:0;height:0';
  svgDefs.innerHTML = `<defs>
    <radialGradient id="litGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#fff5a0"/>
      <stop offset="45%"  stop-color="#f5c030"/>
      <stop offset="100%" stop-color="#c87800"/>
    </radialGradient>
  </defs>`;
  document.body.prepend(svgDefs);

  // ספירה לאחור בזמן אמתי
  const WEDDING_TIME = new Date('2026-08-09T19:00:00');
  const pad = n => String(n).padStart(2, '0');

  function updateTimer() {
    const diff = WEDDING_TIME - new Date();
    if (diff <= 0) {
      document.getElementById('timer').innerHTML = '<span style="color:#c8a84b;font-size:clamp(0.7rem,1.8vh,1rem);letter-spacing:2px">🎉 מזל טוב!</span>';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('t-days').textContent  = pad(d);
    document.getElementById('t-hours').textContent = pad(h);
    document.getElementById('t-mins').textContent  = pad(m);
    document.getElementById('t-secs').textContent  = pad(s);
  }

  updateTimer();
  setInterval(updateTimer, 1000);

  for (let day = 30; day >= 1; day--) {
    const index   = 30 - day;
    const isLit   = index < litCount;
    const isToday = index === litCount - 1 && daysLeft > 0 && daysLeft <= 30;

    const wrap = document.createElement('div');
    wrap.className = 'bulb-wrap' + (isLit ? ' lit' : '') + (isToday ? ' today' : '');

    wrap.innerHTML = `
      <svg viewBox="0 0 52 74" xmlns="http://www.w3.org/2000/svg" style="--i:${index}">
        <!-- חוט תלייה -->
        <line x1="26" y1="0" x2="26" y2="5" stroke="#222" stroke-width="1.5"/>
        <!-- זכוכית -->
        <path class="bulb-glass" d="M26 5 C13 5 7 15 7 24 C7 33 13 41 19 46 L19 53 L33 53 L33 46 C39 41 45 33 45 24 C45 15 39 5 26 5 Z"/>
        <!-- ברק פנימי -->
        <path class="bulb-shine" d="M17 12 C20 9 25 8 29 9 C26 10 21 13 18 17 Z"/>
        <!-- פילמנט -->
        <polyline class="bulb-filament" points="22,50 22,40 26,35 30,40 30,50" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- בסיס -->
        <rect class="bulb-base" x="19" y="53" width="14" height="4" rx="1"/>
        <rect class="bulb-base" x="20" y="57" width="12" height="4" rx="1"/>
        <rect class="bulb-cap"  x="21" y="61" width="10" height="4" rx="2"/>
        <line class="bulb-base-line" x1="19" y1="55" x2="33" y2="55" stroke-width="0.5"/>
        <line class="bulb-base-line" x1="20" y1="59" x2="32" y2="59" stroke-width="0.5"/>
      </svg>
      <span>${day}</span>
    `;

    grid.appendChild(wrap);
  }
</script>
</body>
</html>
